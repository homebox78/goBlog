<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>goBlog 포스팅 어시스턴트</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header>
    <h1>goBlog 포스팅</h1>
    <span id="platform" class="chip">감지 중...</span>
  </header>

  <section id="setup" class="card hidden">
    <label>서버 주소</label>
    <input id="apiBase" placeholder="https://hom2box.com/goBlog" />
    <label>확장 토큰 (.env의 EXTENSION_TOKEN)</label>
    <input id="token" type="password" />
    <button id="saveSetup">저장</button>
  </section>

  <section class="card">
    <div class="row">
      <h2>발행 대기 글</h2>
      <button id="refresh" class="ghost">새로고침</button>
    </div>
    <div id="list"><p class="muted">불러오는 중...</p></div>
  </section>

  <section id="detail" class="card hidden">
    <h2 id="detailTitle"></h2>
    <div class="actions">
      <button id="applyBtn">작성폼에 적용</button>
      <button id="copyBtn" class="ghost">본문 복사</button>
    </div>
    <ul id="notes"></ul>
    <div class="row">
      <input id="publishedUrl" placeholder="발행된 글 URL (선택)" />
      <button id="doneBtn" class="ghost">발행 완료 기록</button>
    </div>
  </section>

  <footer>
    <button id="openSetup" class="link">설정</button>
  </footer>

  <script src="panel.js"></script>
</body>
</html>
