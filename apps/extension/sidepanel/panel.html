<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>goBlog 포스팅 어시스턴트</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header>
    <h1>goBlog 포스팅</h1>
    <span id="platform" class="chip">감지 중...</span>
  </header>

  <main class="scroll">
    <p id="restrictedWarn" class="restricted hidden"></p>

    <section id="setup" class="card hidden">
      <label>서버 주소</label>
      <input id="apiBase" placeholder="https://hom2box.com/goBlog" />
      <label>확장 토큰 (.env의 EXTENSION_TOKEN)</label>
      <input id="token" type="password" />
      <button id="saveSetup">저장</button>
    </section>

    <section class="card">
      <div class="row">
        <h2>발행 대기 글</h2>
        <button id="refresh" class="ghost">새로고침</button>
      </div>
      <p id="catList" class="muted"></p>
      <div id="list"><p class="muted">불러오는 중...</p></div>
    </section>

    <section id="detail" class="card hidden">
      <h2 id="detailTitle"></h2>
      <p id="detailCategory" class="cat-badge"></p>
      <ul id="notes"></ul>
      <p class="muted">발행하면 완료가 자동으로 기록됩니다.</p>
    </section>

    <section id="igSection" class="card hidden">
      <div class="row">
        <h2>📷 인스타그램 캐러셀</h2>
        <button id="igCopyBtn" class="ghost">캡션+태그 복사</button>
      </div>
      <p class="muted">이미지는 블로그 3장을 그대로 씁니다. 아래 이미지를 저장해 캐러셀로 올리고, 슬라이드 제목을 이미지 위에 넣으면 됩니다.</p>
      <div id="igSlides" class="ig-slides"></div>
      <label class="ig-label">캡션(요약본)</label>
      <textarea id="igCaption" class="ig-caption" rows="6" readonly></textarea>
      <p id="igHashtags" class="ig-tags"></p>
    </section>
  </main>

  <div id="actionBar" class="action-bar hidden">
    <div class="actions">
      <button id="applyBtn">작성폼에 적용</button>
      <button id="copyBtn" class="ghost">본문 복사</button>
    </div>
    <button id="doneBtn" class="linkbtn">자동 기록이 안 되면 눌러서 기록</button>
  </div>

  <footer>
    <button id="openSetup" class="link">설정</button>
    <span id="version" class="muted"></span>
  </footer>

  <script src="panel.js"></script>
</body>
</html>
